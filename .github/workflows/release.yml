name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Verify the tag matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi
          echo "VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Test release scripts
        run: npm run test:scripts

      - name: Test extension
        run: xvfb-run -a npm test

      - name: Package extension
        run: npx vsce package --out "gitsouji-${VERSION}.vsix"

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: gitsouji-${{ env.VERSION }}.vsix
          path: gitsouji-${{ env.VERSION }}.vsix

      - name: Extract release notes
        run: node scripts/lib/changelog.mjs extract "${VERSION}" > release-notes.md

      # The two publish steps are independent: a failure in one must not stop the
      # other, nor the GitHub release. The summary step at the end fails the job
      # so a partial release is still reported as a failure.
      - name: Publish to the VS Code Marketplace
        id: marketplace
        continue-on-error: true
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --packagePath "gitsouji-${VERSION}.vsix"

      - name: Publish to Open VSX
        id: openvsx
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          PUBLISHER="$(node -p "require('./package.json').publisher")"
          # First publish for a publisher needs the namespace; creating an
          # existing one is an error we deliberately ignore.
          npx ovsx create-namespace "$PUBLISHER" || echo "namespace $PUBLISHER already exists, continuing"
          npx ovsx publish "gitsouji-${VERSION}.vsix"

      - name: Create the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: gitsouji-${{ env.VERSION }}.vsix

      - name: Report the publish results
        if: always()
        run: |
          echo "VS Code Marketplace: ${{ steps.marketplace.outcome }}"
          echo "Open VSX:            ${{ steps.openvsx.outcome }}"
          if [ "${{ steps.marketplace.outcome }}" = "failure" ] || [ "${{ steps.openvsx.outcome }}" = "failure" ]; then
            echo "::error::a publish step failed; see its step log and republish that registry by hand"
            exit 1
          fi
